name: Refresh Health Metrics

"on":
    schedule:
      - cron: '0 8 * * *'
    workflow_dispatch:

  jobs:
    refresh:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: '3.11'
        - run: pip install requests
        - name: Run refresh script
          run: python scripts/refresh_metrics.py
          env:
            HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
            METABASE_TOKEN: ${{ secrets.METABASE_TOKEN }}
            SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
            INTERCOM_TOKEN: ${{ secrets.INTERCOM_TOKEN }}
        - name: Commit changes
          run: |
            git config user.name "health-score-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git diff --staged --quiet || (git commit -m "auto: daily rawMetrics refresh [skip ci]" && git push)
