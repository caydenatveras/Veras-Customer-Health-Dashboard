<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veras — Community Registry</title>
  <style>
    :root {
      --bg: #f8f9fb;
      --surface: #ffffff;
      --border: #e5e7eb;
      --primary: #3b5bdb;
      --primary-hover: #2f4ac4;
      --danger: #e03131;
      --success: #2f9e44;
      --text: #111827;
      --muted: #6b7280;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; height: 56px; gap: 12px; position: sticky; top: 0; z-index: 10; }
    .logo { font-weight: 700; font-size: 15px; color: var(--primary); }
    .logo span { color: var(--muted); font-weight: 400; }
    .nav-link { font-size: 13px; color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
    .nav-link:hover { background: var(--bg); color: var(--text); }
    .spacer { flex: 1; }
    .unsaved-badge { font-size: 11px; padding: 3px 10px; border-radius: 999px; background: #fef3c7; color: #92400e; font-weight: 600; display: none; }
    .unsaved-badge.show { display: inline-block; }

    /* ── Connect bar ── */
    .connect-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; gap: 10px; align-items: center; }
    .connect-bar input { flex: 1; max-width: 380px; padding: 7px 12px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: monospace; }
    .connect-bar input:focus { outline: none; border-color: var(--primary); }
    .connect-status { font-size: 12px; color: var(--muted); }
    .connect-status.ok { color: var(--success); font-weight: 500; }
    .connect-status.err { color: var(--danger); }

    /* ── Buttons ── */
    .btn { padding: 7px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.12s; line-height: 1.4; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: #fecaca; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--bg); color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* ── Main layout ── */
    main { max-width: 860px; margin: 0 auto; padding: 28px 24px 100px; }
    .page-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .account-count { font-size: 13px; color: var(--muted); }

    /* ── Account card ── */
    .account-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
    .account-header { display: flex; align-items: center; gap: 12px; padding: 13px 16px; cursor: pointer; user-select: none; }
    .account-header:hover { background: #fafafa; }
    .chevron { color: var(--muted); font-size: 11px; transition: transform 0.2s; width: 14px; text-align: center; }
    .chevron.open { transform: rotate(90deg); }
    .account-name-text { font-weight: 600; font-size: 14px; flex: 1; }
    .community-pill { font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 2px 10px; color: var(--muted); font-weight: 500; }
    .account-body { border-top: 1px solid var(--border); padding: 18px; display: none; }
    .account-body.open { display: block; }

    /* ── Meta fields ── */
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .meta-field label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 5px; }
    .meta-field input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
    .meta-field input:focus { outline: none; border-color: var(--primary); }

    /* ── Communities ── */
    .section-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .count-chip { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px; font-size: 11px; font-weight: 700; color: var(--text); text-transform: none; letter-spacing: 0; }
    .community-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .community-row { display: flex; align-items: center; gap: 8px; }
    .community-row input { flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text); }
    .community-row input:focus { outline: none; border-color: var(--primary); }
    .rm-btn { background: none; border: none; cursor: pointer; color: #d1d5db; font-size: 18px; line-height: 1; padding: 3px 6px; border-radius: 4px; flex-shrink: 0; }
    .rm-btn:hover { color: var(--danger); background: #fee2e2; }
    .add-row { display: flex; gap: 8px; }
    .add-row input { flex: 1; padding: 6px 10px; border: 1.5px dashed var(--border); border-radius: 6px; font-size: 13px; color: var(--text); }
    .add-row input:focus { outline: none; border-color: var(--primary); border-style: solid; }

    /* ── Account footer ── */
    .account-footer { display: flex; justify-content: flex-end; margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--border); }

    /* ── Add account ── */
    .add-account-btn { width: 100%; padding: 14px; border: 2px dashed var(--border); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 13px; color: var(--muted); font-weight: 500; transition: border-color 0.12s, background 0.12s; }
    .add-account-btn:hover { border-color: var(--primary); background: #f0f4ff; color: var(--primary); }
    .add-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; display: none; }
    .add-form.show { display: block; }
    .add-form h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
    .add-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
    .add-form .form-field label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 5px; }
    .add-form .form-field input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
    .add-form .form-field input:focus { outline: none; border-color: var(--primary); }
    .add-form-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Save bar ── */
    .save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 12px; box-shadow: 0 -4px 16px rgba(0,0,0,0.07); transform: translateY(100%); transition: transform 0.2s; z-index: 20; }
    .save-bar.show { transform: translateY(0); }
    .save-bar .save-msg { flex: 1; font-size: 13px; color: var(--muted); }

    /* ── States ── */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }
    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: -2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%) translateY(10px); background: #111; color: #fff; padding: 9px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.2s; z-index: 50; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">Veras <span>/ Community Registry</span></div>
  <a href="index.html" class="nav-link">← Dashboard</a>
  <div class="spacer"></div>
  <span class="unsaved-badge" id="unsaved-badge">Unsaved changes</span>
</header>

<div class="connect-bar">
  <input type="password" id="token-input" placeholder="GitHub personal access token (repo scope)" autocomplete="off" />
  <button class="btn btn-primary" id="connect-btn" onclick="connect()">Connect</button>
  <span class="connect-status" id="connect-status">Not connected</span>
</div>

<main>
  <div class="page-header">
    <h1>Accounts</h1>
    <span class="account-count" id="account-count"></span>
  </div>
  <div id="accounts-container">
    <div class="empty-state">Connect your GitHub token above to load the registry.</div>
  </div>
  <div class="add-form" id="add-form">
    <h3>Add Account</h3>
    <div class="add-form-grid">
      <div class="form-field">
        <label>Company Name *</label>
        <input type="text" id="nf-company" placeholder="e.g. Sunrise Post-Acute" />
      </div>
      <div class="form-field">
        <label>HubSpot Company ID</label>
        <input type="text" id="nf-hubspot" placeholder="e.g. 49138203519" />
      </div>
      <div class="form-field">
        <label>Metabase Employer ID</label>
        <input type="text" id="nf-metabase" placeholder="e.g. cmirywohn000g..." />
      </div>
      <div class="form-field">
        <label>Primary CS Rep</label>
        <input type="text" id="nf-rep" placeholder="e.g. Cayden Fox" />
      </div>
    </div>
    <div class="add-form-actions">
      <button class="btn btn-ghost" onclick="hideAddForm()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddAccount()">Add Account</button>
    </div>
  </div>
  <button class="add-account-btn" id="add-account-btn" style="display:none" onclick="showAddForm()">+ Add account</button>
</main>

<div class="save-bar" id="save-bar">
  <span class="save-msg">You have unsaved changes</span>
  <button class="btn btn-ghost btn-sm" onclick="discard()">Discard</button>
  <button class="btn btn-primary btn-sm" id="save-btn" onclick="save()">Save to GitHub</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const REPO   = 'caydenatveras/Veras-Customer-Health-Dashboard';
  const BRANCH = 'main';
  const FILE   = 'community_registry.json';

  let token    = '';
  let registry = null;
  let fileSha  = '';
  let dirty    = false;

  // ── Connect ──────────────────────────────────────────────────────────────────

  async function connect() {
    const t = document.getElementById('token-input').value.trim();
    if (!t) return;
    token = t;
    setConnectState('loading');
    try {
      await loadRegistry();
      setConnectState('ok');
      document.getElementById('token-input').value = '';
      document.getElementById('add-account-btn').style.display = '';
    } catch(e) {
      setConnectState('err', e.message);
      token = '';
    }
  }

  document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

  function setConnectState(state, msg) {
    const btn = document.getElementById('connect-btn');
    const status = document.getElementById('connect-status');
    if (state === 'loading') {
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;
      status.textContent = 'Connecting…';
      status.className = 'connect-status';
    } else if (state === 'ok') {
      btn.innerHTML = 'Connect';
      btn.disabled = false;
      status.textContent = '✓ Connected';
      status.className = 'connect-status ok';
    } else {
      btn.innerHTML = 'Connect';
      btn.disabled = false;
      status.textContent = 'Error: ' + (msg || 'failed');
      status.className = 'connect-status err';
    }
  }

  // ── GitHub API ────────────────────────────────────────────────────────────────

  async function gh(path, method = 'GET', body = null) {
    const opts = {
      method,
      headers: {
        Authorization: 'token ' + token,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch('https://api.github.com/' + path, opts);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'HTTP ' + res.status);
    }
    return res.json();
  }

  async function loadRegistry() {
    try {
      const file = await gh('repos/' + REPO + '/contents/' + FILE + '?ref=' + BRANCH);
      fileSha = file.sha;
      registry = JSON.parse(atob(file.content.replace(/\n/g, '')));
    } catch(e) {
      if (/404|Not Found/i.test(e.message)) {
        registry = { lastUpdated: today(), accounts: {} };
        fileSha = '';
      } else throw e;
    }
    render();
  }

  async function save() {
    const btn = document.getElementById('save-btn');
    btn.innerHTML = '<span class="spinner"></span> Saving…';
    btn.disabled = true;
    try {
      registry.lastUpdated = today();
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(registry, null, 2))));
      const body = { message: 'update: community registry', content, branch: BRANCH };
      if (fileSha) body.sha = fileSha;
      const res = await gh('repos/' + REPO + '/contents/' + FILE, 'PUT', body);
      fileSha = res.content.sha;
      setDirty(false);
      toast('Saved ✓');
    } catch(e) {
      toast('Save failed: ' + e.message);
    }
    btn.innerHTML = 'Save to GitHub';
    btn.disabled = false;
  }

  // ── Render ────────────────────────────────────────────────────────────────────

  function render() {
    const container = document.getElementById('accounts-container');
    const entries = Object.entries(registry.accounts || {});
    document.getElementById('account-count').textContent = entries.length + (entries.length === 1 ? ' account' : ' accounts');
    if (!entries.length) {
      container.innerHTML = '<div class="empty-state">No accounts yet. Add one below.</div>';
      return;
    }
    container.innerHTML = '';
    entries.forEach(([name, data]) => container.appendChild(buildCard(name, data)));
  }

  function buildCard(name, data) {
    const card = document.createElement('div');
    card.className = 'account-card';
    card.dataset.company = name;
    const comms = data.communities || [];

    card.innerHTML = `
      <div class="account-header" onclick="toggleCard(this)">
        <span class="chevron">▶</span>
        <span class="account-name-text">${x(name)}</span>
        <span class="community-pill">${comms.length} communities</span>
      </div>
      <div class="account-body">
        <div class="meta-grid">
          <div class="meta-field">
            <label>HubSpot Company ID</label>
            <input value="${x(data.hubspotCompanyId||'')}" placeholder="e.g. 49138203519"
              onchange="setMeta('${x(name)}','hubspotCompanyId',this.value)" />
          </div>
          <div class="meta-field">
            <label>Metabase Employer ID</label>
            <input value="${x(data.metabaseEmployerId||'')}" placeholder="e.g. cmirywohn000g..."
              onchange="setMeta('${x(name)}','metabaseEmployerId',this.value)" />
          </div>
          <div class="meta-field">
            <label>Primary CS Rep</label>
            <input value="${x(data.csRep||'')}" placeholder="e.g. Cayden Fox"
              onchange="setMeta('${x(name)}','csRep',this.value)" />
          </div>
          <div class="meta-field">
            <label>Renewal Date</label>
            <input value="${x(data.renewalDate||'')}" placeholder="YYYY-MM-DD"
              onchange="setMeta('${x(name)}','renewalDate',this.value)" />
          </div>
        </div>
        <div class="section-label">
          Communities <span class="count-chip">${comms.length}</span>
        </div>
        <div class="community-list">
          ${comms.map((c,i) => `
            <div class="community-row" data-idx="${i}">
              <input value="${x(c)}" onchange="setComm('${x(name)}',${i},this.value)" />
              <button class="rm-btn" onclick="removeComm('${x(name)}',${i})" title="Remove">×</button>
            </div>`).join('')}
        </div>
        <div class="add-row">
          <input placeholder="Add community name and press Enter…"
            onkeydown="if(event.key==='Enter')addComm('${x(name)}',this)" />
          <button class="btn btn-ghost btn-sm" onclick="addComm('${x(name)}',this.previousElementSibling)">Add</button>
        </div>
        <div class="account-footer">
          <button class="btn btn-danger btn-sm" onclick="removeAccount('${x(name)}')">Remove account</button>
        </div>
      </div>
    `;
    return card;
  }

  function refreshCard(name) {
    const old = document.querySelector('[data-company="' + CSS.escape(name) + '"]');
    if (!old) return;
    const wasOpen = old.querySelector('.account-body').classList.contains('open');
    const fresh = buildCard(name, registry.accounts[name]);
    if (wasOpen) {
      fresh.querySelector('.chevron').classList.add('open');
      fresh.querySelector('.account-body').classList.add('open');
    }
    old.replaceWith(fresh);
    // Update account count
    const count = Object.keys(registry.accounts).length;
    document.getElementById('account-count').textContent = count + (count === 1 ? ' account' : ' accounts');
  }

  // ── Interactions ──────────────────────────────────────────────────────────────

  function toggleCard(header) {
    header.querySelector('.chevron').classList.toggle('open');
    header.nextElementSibling.classList.toggle('open');
  }

  function setMeta(name, field, val) {
    registry.accounts[name][field] = val;
    setDirty(true);
  }

  function setComm(name, idx, val) {
    registry.accounts[name].communities[idx] = val;
    setDirty(true);
  }

  function addComm(name, input) {
    const val = input.value.trim();
    if (!val) return;
    registry.accounts[name].communities.push(val);
    input.value = '';
    setDirty(true);
    refreshCard(name);
  }

  function removeComm(name, idx) {
    const commName = registry.accounts[name].communities[idx];
    if (!confirm('Remove "' + commName + '" from ' + name + '?')) return;
    registry.accounts[name].communities.splice(idx, 1);
    setDirty(true);
    refreshCard(name);
  }

  function removeAccount(name) {
    if (!confirm('Remove "' + name + '" and all its communities from the registry?\n\nThis only affects the registry — it won\'t change anything in HubSpot or the dashboard.')) return;
    delete registry.accounts[name];
    setDirty(true);
    render();
  }

  // ── Add Account form ──────────────────────────────────────────────────────────

  function showAddForm() {
    document.getElementById('add-form').classList.add('show');
    document.getElementById('add-account-btn').style.display = 'none';
    document.getElementById('nf-company').focus();
  }

  function hideAddForm() {
    document.getElementById('add-form').classList.remove('show');
    document.getElementById('add-account-btn').style.display = '';
    ['nf-company','nf-hubspot','nf-metabase','nf-rep'].forEach(id => document.getElementById(id).value = '');
  }

  function submitAddAccount() {
    const name = document.getElementById('nf-company').value.trim();
    if (!name) { alert('Company name is required.'); return; }
    if (registry.accounts[name]) { alert('"' + name + '" is already in the registry.'); return; }
    registry.accounts[name] = {
      hubspotCompanyId:   document.getElementById('nf-hubspot').value.trim(),
      metabaseEmployerId: document.getElementById('nf-metabase').value.trim(),
      csRep:              document.getElementById('nf-rep').value.trim(),
      renewalDate: '',
      communities: [],
    };
    setDirty(true);
    hideAddForm();
    render();
    // Auto-open the new card
    requestAnimationFrame(() => {
      const card = document.querySelector('[data-company="' + CSS.escape(name) + '"]');
      if (card) { card.querySelector('.account-header').click(); card.scrollIntoView({ behavior: 'smooth' }); }
    });
  }

  // ── Dirty state ───────────────────────────────────────────────────────────────

  function setDirty(val) {
    dirty = val;
    document.getElementById('save-bar').classList.toggle('show', val);
    document.getElementById('unsaved-badge').classList.toggle('show', val);
  }

  async function discard() {
    if (!confirm('Discard all unsaved changes and reload from GitHub?')) return;
    setDirty(false);
    await loadRegistry();
  }

  window.addEventListener('beforeunload', e => {
    if (dirty) { e.preventDefault(); e.returnValue = ''; }
  });

  // ── Utilities ─────────────────────────────────────────────────────────────────

  function x(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function today() { return new Date().toISOString().slice(0,10); }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
